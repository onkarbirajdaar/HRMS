<!doctype html>
<html>
  <head>
    <title>Attendance</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-5">
      <h2>Attendance Records</h2>
      <a href="{% url 'add_attendance' %}" class="btn btn-success mb-3">
        Mark Attendance
      </a>
      <table class="table table-bordered">
        <thead>
          <tr>
            <th>Employee</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          {% for record in attendance_records %}

          <tr>
            <td>{{ record.employee }}</td>

            <td>{{ record.date }}</td>

            <td>{{ record.status }}</td>
            <td>
              <a
                href="{% url 'edit_attendance' record.id %}"
                class="btn btn-warning btn-sm"
              >
                Edit
              </a>
            </td>
          </tr>

          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
