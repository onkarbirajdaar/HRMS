<!doctype html>
<html>
  <head>
    <title>Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-5">
      <h2>HRMS Dashboard</h2>

      <div class="row mt-4">
        <div class="col-md-6">
          <div class="card">
            <div class="card-body">
              <h5>Total Employees</h5>

              <h2>{{ employee_count }}</h2>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card">
            <div class="card-body">
              <h5>Total Departments</h5>

              <h2>{{ department_count }}</h2>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
